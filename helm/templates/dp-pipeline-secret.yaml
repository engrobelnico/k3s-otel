{{- /*
  Creates the data-prepper pipeline Secret by injecting the OpenSearch password
  from the existing opensearch-admin-password secret at Helm render time.
  The pipeline definition itself lives in values.dataPrepperPipeline (no password in git).
*/ -}}
{{- $osSecret := (lookup "v1" "Secret" .Release.Namespace "opensearch-admin-password") }}
{{- $osPassword := "" }}
{{- if $osSecret }}
  {{- $osPassword = index $osSecret.data "password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: otel-data-prepper-pipeline
  namespace: {{ .Release.Namespace }}
stringData:
  pipelines.yaml: |
{{ .Values.dataPrepperPipeline | replace "__OS_PASSWORD__" $osPassword | indent 4 }}
