{{- /*
  Creates the data-prepper pipeline Secret.
  Pipeline definition lives in values.dataPrepperPipeline (no password in git).
  Password is injected via the dataPrepperPassword Helm parameter, set by deploy-otel.sh:
    argocd app set otel --helm-set-string dataPrepperPassword=<value>
  This is stored only in the ArgoCD Application object in the cluster, not in git.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: otel-data-prepper-pipeline
  namespace: {{ .Release.Namespace }}
stringData:
  pipelines.yaml: |
{{ .Values.dataPrepperPipeline | replace "__OS_PASSWORD__" .Values.dataPrepperPassword | indent 4 }}
