
# Pipeline definition kept here in values.yaml.
# Password is injected at Helm render time via lookup from opensearch-admin-password secret.
# (see templates/dp-pipeline-secret.yaml)
dataPrepperPipeline: |
  entry-pipeline:
    delay: "100"
    source:
      otel_trace_source:
        ssl: false
        authentication:
          unauthenticated: {}
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    sink:
      - pipeline:
          name: "raw-trace-pipeline"
      - pipeline:
          name: "service-map-pipeline"

  raw-trace-pipeline:
    delay: "100"
    source:
      pipeline:
        name: "entry-pipeline"
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    processor:
      - otel_traces: {}
    sink:
      - opensearch:
          hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
          insecure: true
          username: "admin"
          password: "__OS_PASSWORD__"
          index_type: trace-analytics-raw
      - stdout: {}

  service-map-pipeline:
    source:
      pipeline:
        name: "entry-pipeline"
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    processor:
      - service_map: {}
    sink:
      - opensearch:
          hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
          insecure: true
          username: "admin"
          password: "__OS_PASSWORD__"
          index_type: trace-analytics-service-map
      - stdout: {}

  logs-pipeline:
    workers: 1
    delay: "100"
    source:
      otel_logs_source:
        ssl: false
        authentication:
          unauthenticated: {}
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    sink:
      - opensearch:
          hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
          insecure: true
          index_type: custom
          index: "otel-logs-%{yyyy.MM.dd}"
          username: "admin"
          password: "__OS_PASSWORD__"

data-prepper:
  # Pipeline secret is created by templates/dp-pipeline-secret.yaml using Helm lookup.
  # Password is read from opensearch-admin-password secret at render time — not stored in git.
  pipelineConfig:
    demoPipeline: ""
    enabled: false
    existingSecret: otel-data-prepper-pipeline



opentelemetry-collector:
  mode: deployment

  presets:
    logsCollection:
      enabled: true
      includeCollectorLogs: true
  
  image:
    repository: "otel/opentelemetry-collector-contrib"
    tag: "0.127.0"
  
  config:
    receivers:
        otlp:
            protocols:
              http: 
                cors:
                  allowed_origins:
                    - "*"
              grpc: {}
        jaeger:
            protocols:
              grpc: # Default port 14250
              thrift_http: # Default port 14268
              # You can also enable other Jaeger protocols if needed
              # thrift_compact: # Default port 6831/udp
              # thrift_binary: # Default port 6832/udp
        zipkin: {}

    processors:
        batch/traces:
            timeout: 1s
            send_batch_size: 50
        batch/logs:
            timeout: 1s
            send_batch_size: 50

    exporters:
        debug: 
          verbosity: detailed
        otlp/data-prepper:
            endpoint: otel-data-prepper.opensearch.svc.cluster.local:21890
            tls:
              insecure: true
              insecure_skip_verify: true
        otlp/data-prepper-logs:
          endpoint: otel-data-prepper.opensearch.svc.cluster.local:21892
          tls:
            insecure: true
            insecure_skip_verify: true
              
    service:
        pipelines:
            traces:
              receivers: [otlp, jaeger, zipkin]
              processors: [batch/traces]
              exporters: [debug,otlp/data-prepper]
            metrics: null
            logs:
              receivers: [otlp]
              processors: [batch/logs]
              exporters: [otlp/data-prepper-logs]
