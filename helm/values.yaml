
# Pipeline definition kept here in values.yaml.
# dataPrepperPassword is NOT stored in git — it is set as a Helm parameter override
# by deploy-otel.sh using: argocd app set otel --helm-set-string dataPrepperPassword=XXX
# (stored only in the ArgoCD Application object in the cluster)
dataPrepperPassword: ""

dataPrepperPipeline: |
  entry-pipeline:
    delay: "100"
    source:
      otel_trace_source:
        ssl: false
        authentication:
          unauthenticated: {}
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    sink:
      - pipeline:
          name: "raw-trace-pipeline"
      - pipeline:
          name: "service-map-pipeline"

  raw-trace-pipeline:
    delay: "100"
    source:
      pipeline:
        name: "entry-pipeline"
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    processor:
      - otel_traces: {}
    sink:
      - opensearch:
          hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
          insecure: true
          username: "admin"
          password: "__OS_PASSWORD__"
          index_type: trace-analytics-raw
      - stdout: {}

  service-map-pipeline:
    source:
      pipeline:
        name: "entry-pipeline"
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    processor:
      - service_map: {}
    sink:
      - opensearch:
          hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
          insecure: true
          username: "admin"
          password: "__OS_PASSWORD__"
          index_type: trace-analytics-service-map
      - stdout: {}

  logs-pipeline:
    workers: 1
    delay: "100"
    source:
      otel_logs_source:
        ssl: false
        authentication:
          unauthenticated: {}
        port: 21892
    buffer:
      bounded_blocking:
        buffer_size: 10240
        batch_size: 160
    processor:
      - otel_logs: {}
    sink:
      - opensearch:
        hosts: ["https://opensearch.opensearch.svc.cluster.local:9200"]
        insecure: true
        index_type: custom
        index: "otel-logs-%{yyyy.MM.dd}"
        username: "admin"
        password: "__OS_PASSWORD__"
        # Create index template on startup
        index_template:
          name: "otel-logs-template"
          pattern: "otel-logs-*"
          template:
            mappings:
              properties:
                timestamp:
                  type: date
                body:
                  type: text
                resource:
                  type: object
                attributes:
                  type: object

data-prepper:
  # Pipeline secret is created by templates/dp-pipeline-secret.yaml using Helm lookup.
  # Password is injected via dataPrepperPassword Helm parameter (set by deploy-otel.sh).
  pipelineConfig:
    demoPipeline: ""
    enabled: false
    existingSecret: otel-data-prepper-pipeline



opentelemetry-collector:
  mode: daemonset

  # Add GID 0 as supplemental group so the filelog receiver can read
  # /var/log/pods log files (permissions: rw-r----- root root)
  podSecurityContext:
    supplementalGroups: [0]

  presets:
    logsCollection:
      enabled: false
      includeCollectorLogs: false
  
  image:
    repository: "otel/opentelemetry-collector-contrib"
    tag: "0.127.0"
  
  config:
    receivers:
        otlp:
            protocols:
              http: 
                cors:
                  allowed_origins:
                    - "*"
              grpc: {}
        jaeger:
            protocols:
              grpc: # Default port 14250
              thrift_http: # Default port 14268
              # You can also enable other Jaeger protocols if needed
              # thrift_compact: # Default port 6831/udp
              # thrift_binary: # Default port 6832/udp
        zipkin: {}
        filelog:
          include: ["/var/log/pods/*/*/*.log"]
          exclude: ["/var/log/pods/*/opentelemetry-collector/*.log"]
          start_at: beginning
          include_file_path: true
          include_file_name: false
          operators:
            - type: regex_parser
              regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) (?P<log>.*)$'
              on_error: send
              timestamp:
                parse_from: attributes.time
                layout_type: gotime
                layout: '2006-01-02T15:04:05.999999999Z07:00'
            - type: regex_parser
              regex: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)/(?P<container_name>[^/]+)/(\d+)\.log$'
              parse_from: attributes["log.file.path"]
              on_error: send
            - type: move
              from: attributes.namespace
              to: resource["k8s.namespace.name"]
              on_error: send
            - type: move
              from: attributes.pod_name
              to: resource["k8s.pod.name"]
              on_error: send
            - type: move
              from: attributes.container_name
              to: resource["k8s.container.name"]
              on_error: send
            - type: move
              from: attributes.uid
              to: resource["k8s.pod.uid"]
              on_error: send
            - type: move
              from: attributes.log
              to: body
              on_error: send

    processors:
        memory_limiter:
            check_interval: 5s
            limit_percentage: 80
            spike_limit_percentage: 25
        batch/traces:
            timeout: 1s
            send_batch_size: 50
        batch/logs:
            timeout: 5s
            send_batch_size: 50

    exporters:
        debug: 
          verbosity: detailed
        otlp/data-prepper:
            endpoint: otel-data-prepper.opensearch.svc.cluster.local:21890
            tls:
              insecure: true
              insecure_skip_verify: true
        otlp/data-prepper-logs:
          endpoint: otel-data-prepper.opensearch.svc.cluster.local:21892
          tls:
            insecure: true
            insecure_skip_verify: true
          sending_queue:
            queue_size: 5000
              
    service:
        pipelines:
            traces:
              receivers: [otlp, jaeger, zipkin]
              processors: [batch/traces]
              exporters: [debug,otlp/data-prepper]
            metrics: null
            logs:
              receivers: [otlp, filelog]
              processors: [memory_limiter, batch/logs]
              exporters: [otlp/data-prepper-logs]

  extraVolumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
